<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Direct</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .contact-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .contact-box h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .contact-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 6px;
            transition: 0.3s;
            text-align: center;
        }
        .btn-call {
            background-color: #007bff;
        }
        .btn-call:hover {
            background-color: #0056b3;
        }
        .btn-whatsapp {
            background-color: #25d366;
        }
        .btn-whatsapp:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <div class="contact-box">
        <h2>Humse Sampark Karein</h2>
        <p>Aap humein in buttons par click karke direct Call ya WhatsApp kar sakte hain.</p>

        <a href="tel:918827811532" class="btn btn-call">📞 Call Karein</a>

        <a href="https://wa.me/918827811532" target="_blank" class="btn btn-whatsapp">💬 WhatsApp Par Msg Karein</a>
    </div>

</body>
</html>
